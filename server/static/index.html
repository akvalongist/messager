<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XAM Messenger</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <!-- ==================== ЭКРАН АВТОРИЗАЦИИ ==================== -->
    <div id="auth-screen" class="screen active">
        <div class="auth-container">
            <div class="auth-logo">
                <div class="logo-icon">💬</div>
                <h1>XAM Messenger</h1>
                <p class="auth-subtitle">Безопасный мессенджер</p>
            </div>

            <!-- Форма входа -->
            <form id="login-form" class="auth-form active">
                <div class="form-group">
                    <label>Имя пользователя</label>
                    <input type="text" id="login-username" placeholder="username" required autocomplete="username">
                </div>
                <div class="form-group">
                    <label>Пароль</label>
                    <input type="password" id="login-password" placeholder="••••••••" required autocomplete="current-password">
                </div>
                <button type="submit" class="btn-primary">Войти</button>
                <p class="auth-switch">
                    Нет аккаунта? <a href="#" id="show-register">Регистрация</a>
                </p>
            </form>

            <!-- Форма регистрации -->
            <form id="register-form" class="auth-form">
                <div class="form-group">
                    <label>Имя пользователя</label>
                    <input type="text" id="reg-username" placeholder="username" required minlength="3">
                </div>
                <div class="form-group">
                    <label>Отображаемое имя</label>
                    <input type="text" id="reg-display-name" placeholder="Как вас называть?" required>
                </div>
                <div class="form-group">
                    <label>Email (необязательно)</label>
                    <input type="email" id="reg-email" placeholder="email@example.com">
                </div>
                <div class="form-group">
                    <label>Пароль</label>
                    <input type="password" id="reg-password" placeholder="Минимум 8 символов" required minlength="8" autocomplete="new-password">
                </div>
                <button type="submit" class="btn-primary">Создать аккаунт</button>
                <p class="auth-switch">
                    Есть аккаунт? <a href="#" id="show-login">Войти</a>
                </p>
            </form>

            <div id="auth-error" class="error-message"></div>
        </div>
    </div>

    <!-- ==================== ГЛАВНЫЙ ЭКРАН ЧАТА ==================== -->
    <div id="chat-screen" class="screen">
        <!-- Сайдбар -->
        <div class="sidebar-header">
            <div class="user-info">
                <div class="avatar small" id="my-avatar">U</div>
                <div>
                    <span id="my-display-name">User</span>
                    <div id="my-user-id" style="font-size: 10px; color: #6b6b80; cursor: pointer; margin-top: 2px;"
                         onclick="app.copyMyId()" title="Нажми чтобы скопировать ID">
                    </div>
                </div>
            </div>
            <div class="sidebar-actions">
                <button class="icon-btn" id="btn-new-chat" title="Новый чат">✏️</button>
                <button class="icon-btn" id="btn-new-group" title="Новая группа">👥</button>
                <button class="icon-btn" id="btn-logout" title="Выйти">🚪</button>
            </div>
        </div>

        <!-- Область чата -->
        <main id="chat-area" class="chat-area">
            <!-- Пустое состояние -->
            <div id="no-chat-selected" class="no-chat-selected">
                <div class="welcome-message">
                    <div class="welcome-icon">💬</div>
                    <h2>XAM Messenger</h2>
                    <p>Выберите чат или создайте новый</p>
                </div>
            </div>

            <!-- Заголовок чата -->
            <div id="chat-header" class="chat-header hidden">
                <button class="icon-btn mobile-back" id="btn-back">←</button>
                <div class="chat-header-info">
                    <div class="avatar small" id="chat-avatar">C</div>
                    <div>
                        <h3 id="chat-name">Имя чата</h3>
                        <span id="chat-status" class="chat-status">онлайн</span>
                    </div>
                </div>
                <div class="chat-header-actions">
                    <button class="icon-btn" id="btn-attach" title="Прикрепить файл">📎</button>
                    <button class="icon-btn" id="btn-chat-info" title="Информация">ℹ️</button>
                </div>
            </div>

            <!-- Сообщения -->
            <div id="messages-container" class="messages-container hidden">
                <div id="messages-list" class="messages-list"></div>
                <div id="typing-indicator" class="typing-indicator hidden">
                    <span class="typing-dots">
                        <span></span><span></span><span></span>
                    </span>
                    <span id="typing-user">печатает...</span>
                </div>
            </div>

            <!-- Поле ввода -->
            <div id="message-input-area" class="message-input-area hidden">
                <div id="reply-preview" class="reply-preview hidden">
                    <div class="reply-content">
                        <span class="reply-author"></span>
                        <span class="reply-text"></span>
                    </div>
                    <button class="icon-btn reply-close" id="btn-cancel-reply">✕</button>
                </div>
                <div class="input-row">
                    <input type="file" id="file-input" hidden multiple>
                    <button class="icon-btn" id="btn-emoji">😊</button>
                    <textarea id="message-input"
                              placeholder="Напишите сообщение..."
                              rows="1"
                              maxlength="4096"></textarea>
                    <button class="icon-btn send-btn" id="btn-send">➤</button>
                </div>
            </div>
        </main>
    </div>

    <!-- ==================== МОДАЛЬНЫЕ ОКНА ==================== -->

    <!-- Новый чат -->
    <div id="modal-new-chat" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Новый чат</h3>
                <button class="icon-btn modal-close">✕</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label>ID пользователя</label>
                    <input type="text" id="new-chat-user-id" placeholder="Вставьте ID пользователя">
                </div>
                <p class="hint">Узнайте ID в профиле собеседника</p>
            </div>
            <div class="modal-footer">
                <button class="btn-secondary modal-cancel">Отмена</button>
                <button class="btn-primary" id="btn-create-direct">Создать</button>
            </div>
        </div>
    </div>

    <!-- Новая группа -->
    <div id="modal-new-group" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Новая группа</h3>
                <button class="icon-btn modal-close">✕</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label>Название группы</label>
                    <input type="text" id="group-name" placeholder="Моя группа" required>
                </div>
                <div class="form-group">
                    <label>Описание</label>
                    <textarea id="group-description" placeholder="О чём эта группа?" rows="2"></textarea>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn-secondary modal-cancel">Отмена</button>
                <button class="btn-primary" id="btn-create-group">Создать</button>
            </div>
        </div>
    </div>

    <!-- Уведомления -->
    <div id="toast-container" class="toast-container"></div>

    <script src="/static/js/api.js"></script>
    <script src="/static/js/websocket.js"></script>
    <script src="/static/js/ui.js"></script>
    <script src="/static/js/app.js"></script>
</body>
</html>
