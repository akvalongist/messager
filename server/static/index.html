<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XAM Messenger</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

    <!-- ==================== ЭКРАН АВТОРИЗАЦИИ ==================== -->
    <div id="auth-screen" class="screen active">
        <div class="auth-container">
            <div class="auth-logo">
                <div class="logo-icon">💬</div>
                <h1>XAM Messenger</h1>
                <p class="auth-subtitle">Безопасный мессенджер</p>
            </div>

            <form id="login-form" class="auth-form active">
                <div class="form-group">
                    <label>Имя пользователя</label>
                    <input type="text" id="login-username" placeholder="username" required autocomplete="username">
                </div>
                <div class="form-group">
                    <label>Пароль</label>
                    <input type="password" id="login-password" placeholder="••••••••" required autocomplete="current-password">
                </div>
                <button type="submit" class="btn-primary">Войти</button>
                <p class="auth-switch">
                    Нет аккаунта? <a href="#" id="show-register">Регистрация</a>
                </p>
            </form>

            <form id="register-form" class="auth-form">
                <div class="form-group">
                    <label>Имя пользователя</label>
                    <input type="text" id="reg-username" placeholder="username" required minlength="3">
                </div>
                <div class="form-group">
                    <label>Отображаемое имя</label>
                    <input type="text" id="reg-display-name" placeholder="Как вас называть?" required>
                </div>
                <div class="form-group">
                    <label>Email (необязательно)</label>
                    <input type="email" id="reg-email" placeholder="email@example.com">
                </div>
                <div class="form-group">
                    <label>Пароль</label>
                    <input type="password" id="reg-password" placeholder="Минимум 8 символов" required minlength="8" autocomplete="new-password">
                </div>
                <button type="submit" class="btn-primary">Создать аккаунт</button>
                <p class="auth-switch">
                    Есть аккаунт? <a href="#" id="show-login">Войти</a>
                </p>
            </form>

            <div id="auth-error" class="error-message"></div>
        </div>
    </div>

    <!-- ==================== ГЛАВНЫЙ ЭКРАН ==================== -->
    <div id="chat-screen" class="screen">

        <!-- Сайдбар -->
        <aside id="sidebar" class="sidebar">
            <div class="sidebar-header">
                <div class="user-info">
                    <div class="avatar small" id="my-avatar">U</div>
                    <div>
                        <span id="my-display-name">User</span>
                        <div id="my-user-id"
                             style="font-size: 10px; color: #6b6b80; cursor: pointer; margin-top: 2px;"
                             onclick="app.copyMyId()"
                             title="Нажми чтобы скопировать ID">
                        </div>
                    </div>
                </div>
                <div class="sidebar-actions">
                    <button class="icon-btn" id="btn-new-chat" title="Новый чат">✏️</button>
                    <button class="icon-btn" id="btn-new-group" title="Новая группа">👥</button>
                    <button class="icon-btn" id="btn-join-invite" title="Присоединиться по ссылке">🔗</button>
                    <button class="icon-btn" id="btn-logout" title="Выйти">🚪</button>
                </div>
            </div>

            <div class="search-bar">
                <input type="text" id="search-chats" placeholder="🔍 Поиск чатов...">
            </div>

            <div id="chat-list" class="chat-list">
                <div class="empty-state">
                    <p>Нет чатов</p>
                    <p class="hint">Нажмите ✏️ чтобы начать</p>
                </div>
            </div>
        </aside>

        <!-- Область чата -->
        <main id="chat-area" class="chat-area">

            <div id="no-chat-selected" class="no-chat-selected">
                <div class="welcome-message">
                    <div class="welcome-icon">💬</div>
                    <h2>XAM Messenger</h2>
                    <p>Выберите чат или создайте новый</p>
                </div>
            </div>

            <div id="chat-header" class="chat-header hidden">
                <button class="icon-btn mobile-back" id="btn-back">←</button>
                <div class="chat-header-info">
                    <div class="avatar small" id="chat-avatar">C</div>
                    <div>
                        <h3 id="chat-name">Имя чата</h3>
                        <span id="chat-status" class="chat-status"></span>
                    </div>
                </div>
                <div class="chat-header-actions">
                    <button class="icon-btn" id="btn-attach" title="Прикрепить файл">📎</button>
                    <button class="icon-btn" id="btn-chat-info" title="Информация">ℹ️</button>
                </div>
            </div>

            <div id="messages-container" class="messages-container hidden">
                <div id="messages-list" class="messages-list"></div>
                <div id="typing-indicator" class="typing-indicator hidden">
                    <span class="typing-dots">
                        <span></span><span></span><span></span>
                    </span>
                    <span id="typing-user">печатает...</span>
                </div>
            </div>

            <div id="message-input-area" class="message-input-area hidden">
                <div id="reply-preview" class="reply-preview hidden">
                    <div class="reply-content">
                        <span class="reply-author"></span>
                        <span class="reply-text"></span>
                    </div>
                    <button class="icon-btn reply-close" id="btn-cancel-reply">✕</button>
                </div>
                <div class="input-row">
                    <input type="file" id="file-input" hidden multiple>
                    <button class="icon-btn" id="btn-emoji">😊</button>
                    <textarea id="message-input"
                              placeholder="Напишите сообщение..."
                              rows="1"
                              maxlength="4096"></textarea>
                    <button class="icon-btn send-btn" id="btn-send">➤</button>
                </div>
            </div>
        </main>
    </div>

    <!-- ==================== МОДАЛКИ ==================== -->

    <div id="modal-new-chat" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Новый чат</h3>
                <button class="icon-btn modal-close">✕</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label>Поиск по имени</label>
                    <input type="text" id="search-user-input" placeholder="Введите имя пользователя..."
                           oninput="app.searchUsers(this.value)">
                </div>
                <div id="search-results" style="max-height: 200px; overflow-y: auto;"></div>
                <hr style="border-color: #2a2a4a; margin: 12px 0;">
                <div class="form-group">
                    <label>Или вставьте ID</label>
                    <input type="text" id="new-chat-user-id" placeholder="UUID пользователя">
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn-secondary modal-cancel">Отмена</button>
                <button class="btn-primary" id="btn-create-direct">Создать</button>
            </div>
        </div>
    </div>

    <div id="modal-new-group" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Новая группа</h3>
                <button class="icon-btn modal-close">✕</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label>Название группы</label>
                    <input type="text" id="group-name" placeholder="Моя группа" required>
                </div>
                <div class="form-group">
                    <label>Описание</label>
                    <textarea id="group-description" placeholder="О чём эта группа?" rows="2"></textarea>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn-secondary modal-cancel">Отмена</button>
                <button class="btn-primary" id="btn-create-group">Создать</button>
            </div>
        </div>
    </div>

    <!-- Информация о чате -->
    <div id="modal-chat-info" class="modal">
        <div class="modal-content" style="max-width: 500px;">
            <div class="modal-header">
                <h3 id="info-chat-name">Информация о группе</h3>
                <button class="icon-btn modal-close">✕</button>
            </div>
            <div class="modal-body">
                <!-- Инвайт ссылка -->
                <div id="invite-section" style="margin-bottom: 16px;">
                    <label style="font-size: 12px; color: #a0a0b8; text-transform: uppercase;">Ссылка-приглашение</label>
                    <div style="display: flex; gap: 8px; margin-top: 4px;">
                        <input type="text" id="invite-link" readonly
                               style="flex: 1; padding: 8px 12px; background: #1a1a3e; border: 1px solid #2a2a4a; border-radius: 8px; color: white; font-size: 13px;">
                        <button class="btn-primary" style="padding: 8px 16px;" onclick="app.copyInviteLink()">📋</button>
                    </div>
                </div>

                <!-- Добавить участника -->
                <div style="margin-bottom: 16px;">
                    <label style="font-size: 12px; color: #a0a0b8; text-transform: uppercase;">Добавить участника</label>
                    <div style="display: flex; gap: 8px; margin-top: 4px;">
                        <input type="text" id="add-member-search" placeholder="Поиск по имени..."
                               style="flex: 1; padding: 8px 12px; background: #1a1a3e; border: 1px solid #2a2a4a; border-radius: 8px; color: white; font-size: 13px;"
                               oninput="app.searchMembersToAdd(this.value)">
                    </div>
                    <div id="add-member-results" style="max-height: 150px; overflow-y: auto; margin-top: 8px;"></div>
                </div>

                <!-- Список участников -->
                <div>
                    <label style="font-size: 12px; color: #a0a0b8; text-transform: uppercase;">
                        Участники (<span id="members-count">0</span>)
                    </label>
                    <div id="members-list" style="max-height: 300px; overflow-y: auto; margin-top: 8px;"></div>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn-secondary" style="color: #EF4444; border-color: #EF4444;" onclick="app.leaveGroup()">Покинуть группу</button>
                <button class="btn-secondary modal-cancel">Закрыть</button>
            </div>
        </div>
    </div>

    <!-- Присоединиться по ссылке -->
    <div id="modal-join-invite" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Присоединиться к группе</h3>
                <button class="icon-btn modal-close">✕</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label>Инвайт-код</label>
                    <input type="text" id="join-invite-code" placeholder="Вставьте код приглашения">
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn-secondary modal-cancel">Отмена</button>
                <button class="btn-primary" onclick="app.joinByInvite()">Присоединиться</button>
            </div>
        </div>
    </div>

    <div id="toast-container" class="toast-container"></div>

    <script src="/static/js/api.js"></script>
    <script src="/static/js/websocket.js"></script>
    <script src="/static/js/ui.js"></script>
    <script src="/static/js/app.js"></script>
</body>
</html>
